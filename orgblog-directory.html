<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrgBlog — Employee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #FAFAF8;
    --surface:       #FFFFFF;
    --border:        #EBEBEA;
    --text-primary:  #1C1917;
    --text-secondary:#6B7280;
    --text-muted:    #9CA3AF;
    --accent:        #7C3AED;
    --accent-light:  #EDE9FE;
    --accent-mid:    #6D28D9;
    --tag-bg:        #F5F3FF;
    --font-display:  'Playfair Display', Georgia, serif;
    --font-body:     'DM Sans', system-ui, sans-serif;
    --radius:        8px;
    --radius-lg:     14px;
    --shadow-sm:     0 1px 3px rgba(0,0,0,0.06);
    --shadow-md:     0 4px 20px rgba(124,58,237,0.10);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── NAV ──────────────────────────────────────────────────── */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .nav-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 0 24px;
    display: flex; align-items: center; height: 60px; gap: 24px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 600;
    color: var(--text-primary);
    text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0;
  }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link {
    background: none; border: none;
    padding: 6px 14px; border-radius: 6px;
    font-family: var(--font-body); font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    transition: all .15s; display: inline-block;
  }
  .nav-link:hover { background: var(--tag-bg); color: var(--text-primary); }
  .nav-link.active {
    background: var(--accent-light);
    color: var(--accent); font-weight: 500;
  }

  /* ── PAGE WRAPPER ─────────────────────────────────────────── */
  .team-wrap {
    max-width: 1060px; margin: 0 auto; padding: 48px 24px;
  }

  /* ── HEADER ───────────────────────────────────────────────── */
  .team-header {
    display: flex; align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap; gap: 16px;
  }
  .team-header-left h1 {
    font-family: var(--font-display);
    font-size: 34px; font-weight: 400;
    letter-spacing: -0.5px; margin-bottom: 6px;
  }
  .team-header-left h1 em { font-style: italic; color: var(--accent); }
  .team-header-left p {
    color: var(--text-secondary); font-size: 14px;
  }
  .backend-note {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent-light);
    border: 1px solid #DDD6FE;
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 12px; color: var(--accent); font-weight: 500;
    white-space: nowrap;
  }
  .backend-note svg { flex-shrink: 0; }

  /* ── SEARCH / FILTER BAR ──────────────────────────────────── */
  .dir-toolbar {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .dir-search {
    position: relative; flex: 1; max-width: 360px;
  }
  .dir-search svg {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .dir-search input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border); border-radius: 20px;
    background: var(--surface);
    font-family: var(--font-body); font-size: 13px;
    color: var(--text-primary); outline: none;
    transition: all .15s;
  }
  .dir-search input::placeholder { color: var(--text-muted); }
  .dir-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
  }
  .dept-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .dept-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-family: var(--font-body); font-size: 12px;
    color: var(--text-secondary); cursor: pointer;
    transition: all .15s;
  }
  .dept-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--tag-bg); }
  .dept-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── STATS ROW ────────────────────────────────────────────── */
  .dir-stats {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .dir-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    flex: 1; min-width: 140px;
  }
  .dir-stat-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .dir-stat-num {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 400;
    line-height: 1; color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .dir-stat-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-top: 2px;
  }

  /* ── TABLE ────────────────────────────────────────────────── */
  .team-table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .team-table { width: 100%; border-collapse: collapse; }
  .team-table thead { background: var(--tag-bg); }
  .team-table th {
    padding: 12px 20px; text-align: left;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
  }
  .team-table th.sortable { cursor: pointer; user-select: none; }
  .team-table th.sortable:hover { color: var(--accent-mid); }
  .team-table th .sort-icon { margin-left: 4px; opacity: .5; font-size: 10px; }
  .team-table td {
    padding: 14px 20px; font-size: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary); vertical-align: middle;
  }
  .team-table tr:last-child td { border-bottom: none; }
  .team-table tbody tr { transition: background .12s; }
  .team-table tbody tr:hover td { background: #FAFAFF; }

  .emp-av {
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 11px; vertical-align: middle; flex-shrink: 0;
  }
  .emp-name-cell { display: flex; align-items: center; }
  .emp-name-text { font-weight: 500; font-size: 14px; }
  .emp-role { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .email-link {
    color: var(--accent); text-decoration: none; font-weight: 500;
  }
  .email-link:hover { text-decoration: underline; }

  .phone-text { color: var(--text-secondary); font-size: 13px; }

  .resume-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #F0FDF4; color: #16A34A;
    border: 1px solid #BBF7D0;
    font-size: 11px; padding: 3px 10px;
    border-radius: 20px; font-weight: 500;
  }

  .dept-pill {
    background: var(--tag-bg); color: var(--accent);
    font-size: 11px; padding: 3px 10px;
    border-radius: 20px; font-weight: 500;
  }

  /* ── EMPTY STATE ──────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 64px 24px;
  }
  .empty-state svg { margin-bottom: 16px; color: var(--text-muted); }
  .empty-state p {
    font-family: var(--font-display);
    font-style: italic; font-size: 18px;
    color: var(--text-muted);
  }

  /* ── FOOTER ───────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    font-size: 12px; color: var(--text-muted);
  }
</style>
</head>
<body>

<!-- ── NAV ───────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-inner">
    <a class="logo" href="orgblog-landing.html">Org<span>Blog</span></a>
    <div class="nav-links">
      <a class="nav-link" href="orgblog.html">Feed</a>
      <a class="nav-link active" href="#">Directory</a>
    </div>
  </div>
</nav>

<!-- ── MAIN ──────────────────────────────────────────────────────── -->
<main class="team-wrap">

  <!-- Header -->
  <div class="team-header">
    <div class="team-header-left">
      <h1>Employee <em>Directory</em></h1>
      <p>Name, email and contact auto-extracted from resumes by the backend pipeline.</p>
    </div>
    <div class="backend-note">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="3" width="12" height="10" rx="2"/>
        <path d="M5 7h6M5 10h4"/>
      </svg>
      Read-only · synced from backend
    </div>
  </div>

  <!-- Stats -->
  <div class="dir-stats" id="dirStats"></div>

  <!-- Toolbar -->
  <div class="dir-toolbar">
    <div class="dir-search">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="9" cy="9" r="6"/><path d="M15 15l3 3"/>
      </svg>
      <input type="text" id="dirSearch" placeholder="Search by name, email, department…" oninput="filterTable()" />
    </div>
    <div class="dept-filters" id="deptFilters"></div>
  </div>

  <!-- Table -->
  <div class="team-table-wrap">
    <table class="team-table">
      <thead>
        <tr>
          <th class="sortable" onclick="sortBy('name')">Employee <span class="sort-icon" id="sort-name">↕</span></th>
          <th>Email</th>
          <th>Contact</th>
          <th class="sortable" onclick="sortBy('dept')">Department <span class="sort-icon" id="sort-dept">↕</span></th>
          <th>Resume</th>
        </tr>
      </thead>
      <tbody id="teamTableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="20" cy="14" r="7"/><path d="M6 36c0-7.7 6.3-14 14-14s14 6.3 14 14"/>
      </svg>
      <p>No employees match your search.</p>
    </div>
  </div>

</main>

<footer>
  OrgBlog &mdash; Internal knowledge platform &mdash; for the team, by the team.
</footer>

<script>
// ── DATA (replace with your backend API call) ──────────────────────────────
const employees = [
  { name: 'Arjun Sharma',    role: 'Senior Engineer',      email: 'arjun.sharma@orgblog.in',  phone: '+91 98400 11234', dept: 'Engineering' },
  { name: 'Sneha Rao',       role: 'Product Designer',     email: 'sneha.rao@orgblog.in',      phone: '+91 98400 22345', dept: 'Design'      },
  { name: 'Meera Nair',      role: 'Data Analyst',         email: 'meera.nair@orgblog.in',     phone: '+91 98400 33456', dept: 'Data'        },
  { name: 'Rahul Verma',     role: 'Engineering Manager',  email: 'rahul.verma@orgblog.in',    phone: '+91 98400 44567', dept: 'Engineering' },
  { name: 'Priya Mehta',     role: 'Head of Product',      email: 'priya.mehta@orgblog.in',    phone: '+91 98400 55678', dept: 'Product'     },
  { name: 'Kavya Iyer',      role: 'UI/UX Designer',       email: 'kavya.iyer@orgblog.in',     phone: '+91 98400 66789', dept: 'Design'      },
  { name: 'Dev Shetty',      role: 'People Ops Lead',      email: 'dev.shetty@orgblog.in',     phone: '+91 98400 77890', dept: 'Operations'  },
  { name: 'Ananya Krishnan', role: 'Culture & HR Manager', email: 'ananya.k@orgblog.in',       phone: '+91 98400 88901', dept: 'HR'          },
];

// ── STATE ──────────────────────────────────────────────────────────────────
const AV_BG    = ['#EDE9FE','#EFF6FF','#F0FDF4','#FFF1F2','#FFFBEB','#F5F3FF'];
const AV_COLOR = ['#6D28D9','#1D4ED8','#059669','#DC2626','#D97706','#7C3AED'];

let activeDept = 'All';
let sortKey    = null;
let sortAsc    = true;

// ── HELPERS ────────────────────────────────────────────────────────────────
function initials(name) {
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}
function avStyle(name) {
  const i = (name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % AV_BG.length;
  return { bg: AV_BG[i], col: AV_COLOR[i] };
}

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  const depts = [...new Set(employees.map(e => e.dept))].length;
  const stats = [
    { num: employees.length, label: 'Total employees',  icon: '<path d="M8 6a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM14 6a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM2 16c0-3.3 2.7-6 6-6s6 2.7 6 6M10 12.2C11 11.4 12.4 11 14 11c3.3 0 6 2.7 6 6"/>' },
    { num: depts,            label: 'Departments',      icon: '<rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/>' },
    { num: employees.length, label: 'Resumes on file',  icon: '<rect x="3" y="2" width="12" height="16" rx="2"/><path d="M7 7h6M7 10h4"/>' },
  ];
  document.getElementById('dirStats').innerHTML = stats.map(s => `
    <div class="dir-stat">
      <div class="dir-stat-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#7C3AED" stroke-width="1.6">${s.icon}</svg>
      </div>
      <div>
        <div class="dir-stat-num">${s.num}</div>
        <div class="dir-stat-label">${s.label}</div>
      </div>
    </div>`).join('');
}

// ── DEPT FILTERS ───────────────────────────────────────────────────────────
function renderDeptFilters() {
  const depts = ['All', ...[...new Set(employees.map(e => e.dept))].sort()];
  document.getElementById('deptFilters').innerHTML = depts.map(d => `
    <button class="dept-btn${d === activeDept ? ' active' : ''}" onclick="setDept('${d}')">${d}</button>
  `).join('');
}
function setDept(d) { activeDept = d; renderDeptFilters(); renderTable(); }

// ── SORT ───────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  ['name','dept'].forEach(k => {
    const el = document.getElementById('sort-' + k);
    if (el) el.textContent = k === sortKey ? (sortAsc ? '↑' : '↓') : '↕';
  });
  renderTable();
}

// ── TABLE ──────────────────────────────────────────────────────────────────
function filterTable() { renderTable(); }

function renderTable() {
  const q = document.getElementById('dirSearch').value.toLowerCase().trim();
  let list = employees.filter(e => {
    const deptOk = activeDept === 'All' || e.dept === activeDept;
    const qOk = !q || e.name.toLowerCase().includes(q)
      || e.email.toLowerCase().includes(q)
      || e.dept.toLowerCase().includes(q)
      || e.role.toLowerCase().includes(q);
    return deptOk && qOk;
  });

  if (sortKey) {
    list = [...list].sort((a, b) => {
      const av = a[sortKey].toLowerCase();
      const bv = b[sortKey].toLowerCase();
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  const tbody = document.getElementById('teamTableBody');
  const empty = document.getElementById('emptyState');

  if (!list.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = list.map(e => {
    const av = avStyle(e.name);
    return `<tr>
      <td>
        <div class="emp-name-cell">
          <div class="emp-av" style="background:${av.bg};color:${av.col}">${initials(e.name)}</div>
          <div>
            <div class="emp-name-text">${e.name}</div>
            <div class="emp-role">${e.role}</div>
          </div>
        </div>
      </td>
      <td><a class="email-link" href="mailto:${e.email}">${e.email}</a></td>
      <td><span class="phone-text">${e.phone}</span></td>
      <td><span class="dept-pill">${e.dept}</span></td>
      <td><span class="resume-badge">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 6l3 3 5-5"/>
        </svg>
        On file
      </span></td>
    </tr>`;
  }).join('');
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderStats();
renderDeptFilters();
renderTable();
</script>
</body>
</html>
