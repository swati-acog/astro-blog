services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ghcr.io/swati-acog/astro-blog:latest
    container_name: astro-blogs
    restart: unless-stopped
    ports:
      - "4321:4321"
    labels:
      - "user=${USER}"
      - "description=blogging application built on astro"
    environment:
      - NODE_ENV=production
